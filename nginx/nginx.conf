events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Logs
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  # Performance
  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript
             text/xml application/xml text/javascript application/x-mpegurl;

  # ── TV Web App ─────────────────────────────────────────
  upstream tv_app     { server tv-web-app:3000;   keepalive 32; }
  upstream api_gw     { server api-gateway:3001;  keepalive 32; }
  upstream health_svc { server health-service:3002; }
  upstream stream_svc { server stream-service:3003; }

  server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # TV App
    location / {
      proxy_pass http://tv_app;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    # API Gateway
    location /api/ {
      rewrite ^/api/(.*) /$1 break;
      proxy_pass http://api_gw;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_http_version 1.1;
      # Timeout maior para health checks de stream
      proxy_connect_timeout 10s;
      proxy_read_timeout 30s;
      proxy_send_timeout 10s;
    }

    # Health check público
    location /health {
      proxy_pass http://api_gw/health;
      access_log off;
    }

    # Static assets — cache longo
    location ~* \.(js|css|png|jpg|svg|ico|woff2|ttf)$ {
      proxy_pass http://tv_app;
      proxy_cache_valid 200 7d;
      add_header Cache-Control "public, max-age=604800, immutable";
    }

    # HLS playlist — sem cache
    location ~* \.(m3u8|m3u)$ {
      proxy_pass http://tv_app;
      add_header Cache-Control "no-cache, no-store, must-revalidate";
      add_header Access-Control-Allow-Origin "*";
    }
  }
}
