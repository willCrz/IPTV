[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/tv-web-app/Dockerfile"

[deploy]
startCommand = "node apps/tv-web-app/server.js"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Required build-time variable (set in Railway dashboard):
#   NEXT_PUBLIC_API_URL = https://<your-api-gateway>.up.railway.app
