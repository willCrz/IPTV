version: '3.9'

services:
  # ── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: iptv_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-iptv_pro}
      POSTGRES_USER: ${DB_USER:-iptv_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-iptv_pass}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/api-gateway/src/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-iptv_user} -d ${DB_NAME:-iptv_pro}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: iptv_redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API Gateway ─────────────────────────────────────────
  api-gateway:
    build:
      context: ./backend/api-gateway
      dockerfile: Dockerfile
    container_name: iptv_api_gateway
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${DB_USER:-iptv_user}:${DB_PASSWORD:-iptv_pass}@postgres:5432/${DB_NAME:-iptv_pro}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      SENTRY_DSN: ${SENTRY_DSN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Health Service ──────────────────────────────────────
  health-service:
    build:
      context: ./backend/health-service
      dockerfile: Dockerfile
    container_name: iptv_health_service
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      PORT: 3002
      REDIS_URL: redis://redis:6379
      HEALTH_CHECK_INTERVAL: ${HEALTH_CHECK_INTERVAL:-30000}
      PING_TIMEOUT: ${PING_TIMEOUT:-5000}
    depends_on:
      redis:
        condition: service_healthy

  # ── Stream Service ──────────────────────────────────────
  stream-service:
    build:
      context: ./backend/stream-service
      dockerfile: Dockerfile
    container_name: iptv_stream_service
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: production
      PORT: 3003
      REDIS_URL: redis://redis:6379
      STREAM_TIMEOUT: ${STREAM_TIMEOUT:-10000}
    depends_on:
      redis:
        condition: service_healthy

  # ── TV Web App ──────────────────────────────────────────
  tv-web-app:
    build:
      context: .
      dockerfile: apps/tv-web-app/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    container_name: iptv_tv_web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_PLATFORM: web
    depends_on:
      api-gateway:
        condition: service_healthy

  # ── Nginx Reverse Proxy ─────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: iptv_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - tv-web-app
      - api-gateway

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: iptv_network
