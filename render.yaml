services:
  - type: web
    name: iptv-api
    env: node
    region: oregon
    plan: free
    rootDir: backend/api-gateway
    buildCommand: npm ci && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: iptv-db
          property: connectionString
      - key: CORS_ORIGIN
        sync: false
      - key: RATE_LIMIT_MAX
        value: 200
      - key: HEALTH_CHECK_INTERVAL
        value: 30000
      - key: PING_TIMEOUT
        value: 5000
      - key: STREAM_TIMEOUT
        value: 10000

databases:
  - name: iptv-db
    databaseName: iptv_pro
    user: iptv_user
    plan: free
